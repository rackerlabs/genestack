---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: flex-gateway
  namespace: envoy-gateway
  annotations:
    cert-manager.io/cluster-issuer: flex-gateway-issuer
    acme.cert-manager.io/http01-edit-in-place: "true"
spec:
  gatewayClassName: eg
  infrastructure:
    annotations:
      metallb.io/address-pool: gateway-api-external
  listeners:
    - name: http-wildcard-listener
      port: 80
      protocol: HTTP
      hostname: "*.cluster.local"
      allowedRoutes:
        namespaces:
          from: All

apiVersion: apps/v1
kind: Deployment
metadata:
  name: keystone-api
spec:
  template:
    spec:
      initContainers:
        - name: sync-fernet-credential-permissions
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              sync_dir() {
                src="$1"
                dst="$2"
                mkdir -p "$dst"
                for key in "$src"/*; do
                  [ -f "$key" ] || continue
                  name="$(basename "$key")"
                  tmp="$dst/.tmp.$name"
                  rm -f "$tmp"
                  cp -fL "$key" "$tmp"
                  chmod 400 "$tmp"
                  mv -f "$tmp" "$dst/$name"
                done
                for key in "$dst"/*; do
                  [ -f "$key" ] || continue
                  [ -f "$src/$(basename "$key")" ] || rm -f "$key"
                done
                find "$dst" -name '.tmp.*' -type f -delete
                chown -R 42424:42424 "$dst"
                chmod 700 "$dst"
                find "$dst" -type f -exec chmod 400 {} +
              }
              sync_dir /source-fernet-keys /etc/keystone/fernet-keys
              sync_dir /source-credential-keys /etc/keystone/credential-keys
          image: busybox:1.36.1
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - mountPath: /etc/keystone/fernet-keys
              name: fernet-keys-fixed
            - mountPath: /etc/keystone/credential-keys
              name: credential-keys-fixed
            - mountPath: /source-fernet-keys
              name: keystone-fernet-keys
              readOnly: true
            - mountPath: /source-credential-keys
              name: keystone-credential-keys
              readOnly: true
          securityContext:
            runAsUser: 0
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
          resources:
            limits:
              cpu: 100m
              memory: 64Mi
            requests:
              cpu: 50m
              memory: 16Mi
      containers:
        - name: keystone-api
          volumeMounts:
            - mountPath: /etc/keystone/fernet-keys/
              name: fernet-keys-fixed
            - mountPath: /etc/keystone/credential-keys/
              name: credential-keys-fixed
        - name: sync-fernet-credential-permissions
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              sync_dir() {
                src="$1"
                dst="$2"
                mkdir -p "$dst"
                for key in "$src"/*; do
                  [ -f "$key" ] || continue
                  name="$(basename "$key")"
                  tmp="$dst/.tmp.$name"
                  rm -f "$tmp"
                  cp -fL "$key" "$tmp"
                  chmod 400 "$tmp"
                  mv -f "$tmp" "$dst/$name"
                done
                for key in "$dst"/*; do
                  [ -f "$key" ] || continue
                  [ -f "$src/$(basename "$key")" ] || rm -f "$key"
                done
                find "$dst" -name '.tmp.*' -type f -delete
                chown -R 42424:42424 "$dst"
                chmod 700 "$dst"
                find "$dst" -type f -exec chmod 400 {} +
              }
              while true; do
                sync_dir /source-fernet-keys /etc/keystone/fernet-keys
                sync_dir /source-credential-keys /etc/keystone/credential-keys
                sleep 30
              done
          image: busybox:1.36.1
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - mountPath: /etc/keystone/fernet-keys
              name: fernet-keys-fixed
            - mountPath: /etc/keystone/credential-keys
              name: credential-keys-fixed
            - mountPath: /source-fernet-keys
              name: keystone-fernet-keys
              readOnly: true
            - mountPath: /source-credential-keys
              name: keystone-credential-keys
              readOnly: true
          securityContext:
            runAsUser: 0
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
          resources:
            limits:
              cpu: 100m
              memory: 64Mi
            requests:
              cpu: 50m
              memory: 16Mi
      volumes:
        # Secret volume file modes are configurable, but kubelet keeps the
        # repository directory world-readable. Keystone checks that directory,
        # so the keys are copied into emptyDirs that can be chmod 700.
        - name: keystone-fernet-keys
          secret:
            defaultMode: 256
        - name: keystone-credential-keys
          secret:
            defaultMode: 256
        - name: fernet-keys-fixed
          emptyDir: {}
        - name: credential-keys-fixed
          emptyDir: {}

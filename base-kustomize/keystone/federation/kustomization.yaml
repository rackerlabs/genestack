---
sortOptions:
  order: fifo
resources:
  - ../base

images:
  - name: keystone-shib
    newName: ghcr.io/rackerlabs/genestack-images/shibd
    newTag: "latest"

patches:
  - path: fix-fernet-credential-permissions.yaml
  - target:
      kind: Service
      name: keystone-api
    patch: |-
      - op: add
        path: /spec/sessionAffinity
        value: ClientIP
      - op: add
        path: /spec/sessionAffinityConfig
        value:
          clientIP:
            timeoutSeconds: 28800
  - target:
      kind: Deployment
      name: keystone-api
    patch: |-
      - op: add
        path: /spec/template/spec/volumes/-
        value:
          name: fernet-keys-fixed
          emptyDir: {}
      - op: add
        path: /spec/template/spec/volumes/-
        value:
          name: credential-keys-fixed
          emptyDir: {}
      - op: add
        path: /spec/template/spec/volumes/-
        value:
          name: keystone-shibd-etc
          secret:
            secretName: keystone-shibd-etc
      - op: add
        path: /spec/template/spec/volumes/-
        value:
          name: run-shibd
          emptyDir: {}
      - op: add
        path: /spec/template/spec/initContainers/-
        value:
          name: fix-fernet-credential-permissions
          command:
            - /bin/sh
            - -c
            - |
              cp -fL /source-fernet-keys/* /etc/keystone/fernet-keys/
              cp -fL /source-credential-keys/* /etc/keystone/credential-keys/
              chown -R 42424:42424 /etc/keystone/fernet-keys /etc/keystone/credential-keys
              chmod 700 /etc/keystone/fernet-keys /etc/keystone/credential-keys
              chmod 400 /etc/keystone/fernet-keys/* /etc/keystone/credential-keys/*
          image: busybox:latest
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - mountPath: /etc/keystone/fernet-keys
              name: fernet-keys-fixed
            - mountPath: /etc/keystone/credential-keys
              name: credential-keys-fixed
            - mountPath: /source-fernet-keys
              name: keystone-fernet-keys
              readOnly: true
            - mountPath: /source-credential-keys
              name: keystone-credential-keys
              readOnly: true
          securityContext:
            runAsUser: 0
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
          resources:
            limits:
              cpu: "100m"
              memory: 64Mi
            requests:
              cpu: 50m
              memory: 16Mi
      - op: add
        path: /spec/template/spec/containers/0/volumeMounts/-
        value:
          mountPath: "/etc/shibboleth"
          name: keystone-shibd-etc
          readOnly: true
      - op: add
        path: /spec/template/spec/containers/0/volumeMounts/-
        value:
          mountPath: "/var/run/shibboleth"
          name: run-shibd
      - op: add
        path: /spec/template/spec/containers/-
        value:
          command:
            - /usr/sbin/shibd
            - -f
            - -c
            - /etc/shibboleth/shibboleth2.xml
            - -p
            - /var/run/shibboleth/shibd.pid
            - -F
          name: keystone-shib
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          image: keystone-shib
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - mountPath: "/etc/shibboleth"
              name: keystone-shibd-etc
              readOnly: true
            - mountPath: /var/run/shibboleth
              name: run-shibd
          livenessProbe:
            exec:
              command:
              - stat
              - /var/run/shibboleth/shibd.sock
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
              - stat
              - /var/run/shibboleth/shibd.sock
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            limits:
              cpu: "1"
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 64Mi

---
apiVersion: rabbitmq.com/v1beta1
kind: User
metadata:
  name: blazar-reservation-splitter
  namespace: openstack
  labels:
    app.kubernetes.io/managed-by: "Helm"
  annotations:
    helm.sh/resource-policy: keep
    meta.helm.sh/release-name: "blazar-reservation-splitter"
    meta.helm.sh/release-namespace: "openstack"
spec:
  tags:
    - management
    - policymaker
  rabbitmqClusterReference:
    name: rabbitmq
    namespace: openstack
  importCredentialsSecret:
    name: blazar-reservation-splitter-rabbitmq-password
---
apiVersion: rabbitmq.com/v1beta1
kind: Queue
metadata:
  name: blazar-reservation-splitter-queue
  namespace: openstack
  labels:
    app.kubernetes.io/managed-by: "Helm"
  annotations:
    helm.sh/resource-policy: keep
    meta.helm.sh/release-name: "blazar-reservation-splitter"
    meta.helm.sh/release-namespace: "openstack"
spec:
  name: blazar-reservation-splitter-qq
  vhost: "blazar"
  type: quorum
  autoDelete: false
  durable: true
  rabbitmqClusterReference:
    name: rabbitmq
    namespace: openstack
---
apiVersion: rabbitmq.com/v1beta1
kind: Permission
metadata:
  name: blazar-reservation-splitter-permission
  namespace: openstack
  labels:
    app.kubernetes.io/managed-by: "Helm"
  annotations:
    helm.sh/resource-policy: keep
    meta.helm.sh/release-name: "blazar-reservation-splitter"
    meta.helm.sh/release-namespace: "openstack"
spec:
  vhost: "blazar"
  userReference:
    name: "blazar-reservation-splitter"
  permissions:
    write: ".*"
    configure: ".*"
    read: ".*"
  rabbitmqClusterReference:
    name: rabbitmq
    namespace: openstack

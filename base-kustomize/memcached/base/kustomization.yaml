---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

sortOptions:
  order: fifo

resources:
  - all.yaml

patches:
  - target:
      kind: StatefulSet
      name: memcached
    path: memcached-statefulset-extra-env-vars-patch.yaml

  - target:
      kind: ConfigMap
      name: memcached-bin
    path: memcached-bin-configmap-patch.yaml

  - path: memcached-statefulset-patch.yaml
    target:
      kind: StatefulSet
      name: memcached

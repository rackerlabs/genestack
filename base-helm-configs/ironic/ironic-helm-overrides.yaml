---
images:
  tags:
    ironic_manage_cleaning_network: "ghcr.io/rackerlabs/genestack-images/openstack-client:latest"
    ironic_retrive_cleaning_network: "ghcr.io/rackerlabs/genestack-images/openstack-client:latest"
    ironic_retrive_swift_config: "ghcr.io/rackerlabs/genestack-images/openstack-client:latest"
    bootstrap: "ghcr.io/rackerlabs/genestack-images/openstack-client:latest"
    db_drop: "ghcr.io/rackerlabs/genestack-images/openstack-client:latest"
    db_init: "ghcr.io/rackerlabs/genestack-images/openstack-client:latest"
    ironic_db_sync: "ghcr.io/rackerlabs/genestack-images/ironic-api:2025.1-latest"
    ks_user: "ghcr.io/rackerlabs/genestack-images/openstack-client:latest"
    ks_service: "ghcr.io/rackerlabs/genestack-images/openstack-client:latest"
    ks_endpoints: "ghcr.io/rackerlabs/genestack-images/openstack-client:latest"
    rabbit_init: null
    ironic_api: "ghcr.io/rackerlabs/genestack-images/ironic-api:2025.1-latest"
    ironic_conductor: "ghcr.io/rackerlabs/genestack-images/ironic-conductor:2025.1-latest"
    ironic_pxe: "ghcr.io/rackerlabs/genestack-images/ironic-pxe:2025.1-latest"
    ironic_pxe_init: "ghcr.io/rackerlabs/genestack-images/ironic-pxe:2025.1-latest"
    ironic_pxe_http: "docker.io/nginx:1.29.8" # Retained from openstack-helm master branch
    dep_check: "ghcr.io/rackerlabs/genestack-images/kubernetes-entrypoint:latest"
    image_repo_sync: null
  pull_policy: "IfNotPresent"

conf:
  ironic:
    DEFAULT:
      grub_config_path: "EFI/ubuntu/grub.cfg"
      log_config_append: /etc/ironic/logging.conf
      tempdir: /var/lib/ironic/tmp
      default_deploy_interface: "direct"
      default_inspect_interface: "agent"
      default_network_interface: "flat"
      enabled_hardware_types: "ilo,ipmi,redfish,idrac"
      enabled_bios_interfaces: "ilo,no-bios,idrac-redfish,redfish"
      enabled_boot_interfaces: "pxe,ipxe,redfish-virtual-media,redfish-https,ilo-virtual-media,ilo-pxe"
      enabled_console_interfaces: "no-console"
      enabled_deploy_interfaces: "direct,ramdisk"
      enabled_firmware_interfaces: "redfish,no-firmware"
      enabled_inspect_interfaces: "ilo,agent,no-inspect,inspector,idrac-redfish,redfish"
      enabled_management_interfaces: "ilo,ipmitool,idrac-redfish,redfish"
      enabled_network_interfaces: "flat,neutron,noop"
      enabled_power_interfaces: "ilo,ipmitool,idrac-redfish,redfish"
      enabled_raid_interfaces: "agent,idrac-redfish,redfish,no-raid"
      enabled_rescue_interfaces: "no-rescue,agent"
      enabled_storage_interfaces: "noop"
      enabled_vendor_interfaces: "ipmitool,ilo,idrac-redfish,redfish,no-vendor"
    conductor:
      sync_power_state_interval: "60"
      automated_clean: "False"
      heartbeat_timeout: "7200"
      deploy_callback_timeout: "7200"
      inspect_timeout: "3600"
      image_convert_on_size_mismatch: "True"
    deploy:
      erase_devices_priority: "10"
      shred_random_overwrite_iterations: "0"
      shred_final_overwrite_with_zeros: "True"
      continue_if_disk_secure_erase_fails: "False"
      power_off_after_deploy_failure: "True"
      default_boot_option: "local"
      iso_master_path: "/var/lib/ironic/master_iso_images"
    agent:
      efi_boot_partition: "/boot/efi"
      image_download_source: "http"
      deploy_logs_collect: "always"
      deploy_logs_storage_backend: "local"
      deploy_logs_local_path: "/var/lib/ironic/logs"
    pxe:
      kernel_append_params: "nofb nomodeset vga=normal ipa-debug=1"
      images_path: /var/lib/openstack-helm/ironic/images
      instance_master_path: /var/lib/openstack-helm/ironic/master_images
      tftp_root: /var/lib/openstack-helm/tftpboot
      tftp_master_path: /var/lib/openstack-helm/tftpboot/master_images
      pxe_bootfile_name: "undionly.kpxe"
      uefi_pxe_bootfile_name: "ipxe.efi"
      ipxe_enabled: true
    ilo:
      use_web_server_for_images: "True"
      kernel_append_params: "nofb nomodeset vga=normal ipa-debug=1"
    redfish:
      use_swift: false
      kernel_append_params: "nofb nomodeset vga=normal ipa-debug=1"
    cache:
      enabled: true
      backend: dogpile.cache.memcached
    database:
      connection_debug: 0
      connection_recycle_time: 600
      connection_trace: true
      idle_timeout: 3600
      mysql_sql_mode: ""
      use_db_reconnect: true
      pool_timeout: 60
      max_retries: -1
    glance:
      auth_type: password
    keystone_authtoken:
      auth_type: password
      auth_version: v3
      memcache_security_strategy: ENCRYPT
      service_token_roles: service
      service_token_roles_required: true
      service_type: baremetal
    nova:
      auth_type: password
      service_type: compute
      valid_interfaces: internal
    neutron:
      auth_type: password
      cleaning_network: "baremetal-cleaning-network"
      provisioning_network: "baremetal-provisioning-network"
    service_catalog:
      valid_interfaces: public
    oslo_messaging_rabbit:
      amqp_durable_queues: false
      rabbit_ha_queues: false
      rabbit_quorum_queue: true
      rabbit_transient_quorum_queue: false
      use_queue_manager: false
      rabbit_interval_max: 10
      heartbeat_rate: 3
      heartbeat_timeout_threshold: 60
      kombu_reconnect_delay: 0.5
    oslo_policy:
      # enforce_scope: Deprecated, will be removed in 2025.2. OpenStack always enforces scope checks.
      enforce_scope: false
      # enforce_new_defaults: Enable to use new policy defaults instead of deprecated ones for stricter RBAC.
      enforce_new_defaults: false
    policy: []
  logging:
    logger_root:
      level: INFO
      handlers:
        - stdout
  rabbitmq:
    policies: []

network:
  backend:
    - ovn
  pxe:
    device: br-host
    neutron_network_name: baremetal-provisioning-network
    neutron_subnet_name: baremetal-provisioning-network
    neutron_provider_network: physnet2
    # NOTE: The following subnet configuration is aligned with dedicated provisioning network settings in Neutron's.
    neutron_subnet_gateway: 172.24.6.1/24
    neutron_subnet_cidr: 172.24.6.0/24
    neutron_subnet_alloc_start: 172.24.6.100
    neutron_subnet_alloc_end: 172.24.6.200
    neutron_subnet_dns_nameserver: 8.8.8.8 # Aligned with Neutron's OVN DNS

bootstrap:
  image:
    enabled: true
    openstack:
      enabled: true
      ks_user: ironic
    # NOTE: if source_base is null the source will be used as is
    source_base: https://tarballs.opendev.org/openstack/ironic-python-agent/dib/files
    structured:
      ironic-agent.initramfs:
        source: ipa-centos9-stable-2026.1.initramfs
        disk_format: ari
        container_format: ari
      ironic-agent.kernel:
        source: ipa-centos9-stable-2026.1.kernel
        disk_format: aki
        container_format: aki
  network:
    enabled: false
    openstack:
      enabled: false
  object_store:
    enabled: false
    openstack:
      enabled: false

dependencies:
  static:
    api:
      jobs:
        - ironic-db-sync
        - ironic-ks-user
        - ironic-ks-endpoints
      services:
        - endpoint: internal
          service: oslo_db
        - endpoint: internal
          service: identity
        - endpoint: internal
          service: oslo_messaging
    conductor:
      jobs:
        - ironic-db-sync
        - ironic-ks-user
        - ironic-ks-endpoints
      services:
        - endpoint: internal
          service: oslo_db
        - endpoint: internal
          service: identity
        - endpoint: internal
          service: baremetal
        - endpoint: internal
          service: oslo_messaging
    db_sync:
      jobs:
        - ironic-db-init

endpoints:
  baremetal:
    hosts:
      default: ironic-api
      public: ironic
    port:
      api:
        default: 6385
        public: 80
      pxe_http:
        default: 8080
  identity:
    hosts:
      default: keystone-api
    host_fqdn_override:
      default: keystone-api.openstack.svc.cluster.local
    port:
      api:
        default: 5000
        internal: 5000
        public: 80
        service: 5000
  image:
    hosts:
      default: glance-api
    host_fqdn_override:
      default: glance-api.openstack.svc.cluster.local
    port:
      api:
        default: 9292
        internal: 9292
        public: 80
        service: 9292
  volumev3:
    name: cinderv3
    hosts:
      default: cinder-api
      public: cinder
    host_fqdn_override:
      default: cinder-api.openstack.svc.cluster.local
    path:
      default: '/v3/%(tenant_id)s'
      healthcheck: /healthcheck
    port:
      api:
        default: 8776
        public: 80
  compute:
    name: nova
    hosts:
      default: nova-api
      public: nova
    host_fqdn_override:
      default: nova-api.openstack.svc.cluster.local
    path:
      default: "/v2.1/"
    scheme:
      default: 'http'
    port:
      api:
        default: 8774
        public: 80
      novncproxy:
        default: 6080
  network:
    hosts:
      default: neutron-server
    host_fqdn_override:
      default: neutron-server.openstack.svc.cluster.local
    port:
      api:
        default: 9696
        internal: 9696
        public: 80
        service: 9696
  oslo_db:
    host_fqdn_override:
      default: mariadb-cluster-primary.openstack.svc.cluster.local
    hosts:
      default: mariadb-cluster-primary
    port:
      mysql:
        default: 3306
  oslo_cache:
    host_fqdn_override:
      default: memcached.openstack.svc.cluster.local
    hosts:
      default: memcached
    port:
      memcache:
        default: 11211
  oslo_messaging:
    host_fqdn_override:
      default: rabbitmq.openstack.svc.cluster.local
    hosts:
      default: rabbitmq-nodes
    port:
      amqp:
        default: 5672

pod:
  resources:
    enabled: true
  replicas:
    api: 1
    conductor: 1
  useHostNetwork:
    conductor: true
  useHostIPC:
    conductor: true

manifests:
  deployment_api: true
  ingress_api: false
  job_bootstrap: true
  job_db_drop: false
  job_db_init: false
  job_db_sync: true
  job_ks_endpoints: true
  job_ks_service: true
  job_ks_user: true
  job_manage_cleaning_network: false
  job_rabbit_init: false
  service_ingress_api: false
  statefulset_conductor: true

---
labels:
  api:
    node_selector_key: openstack-control-plane
    node_selector_value: enabled
  backup:
    node_selector_key: openstack-control-plane
    node_selector_value: enabled
  job:
    node_selector_key: openstack-control-plane
    node_selector_value: enabled
  scheduler:
    node_selector_key: openstack-control-plane
    node_selector_value: enabled
  test:
    node_selector_key: openstack-control-plane
    node_selector_value: enabled
  volume:
    node_selector_key: openstack-control-plane
    node_selector_value: enabled

images:
  tags:
    bootstrap: "ghcr.io/rackerlabs/genestack-images/openstack-client:latest"
    cinder_api: "ghcr.io/rackerlabs/genestack-images/cinder:2025.1-latest"
    cinder_backup: "ghcr.io/rackerlabs/genestack-images/cinder:2025.1-latest"
    cinder_backup_storage_init: "quay.io/rackspace/rackerlabs-ceph-config-helper:latest-ubuntu_jammy"
    cinder_db_sync: "ghcr.io/rackerlabs/genestack-images/cinder:2025.1-latest"
    cinder_db_purge: "ghcr.io/rackerlabs/genestack-images/cinder:2025.1-latest"
    cinder_scheduler: "ghcr.io/rackerlabs/genestack-images/cinder:2025.1-latest"
    cinder_storage_init: "quay.io/rackspace/rackerlabs-ceph-config-helper:latest-ubuntu_jammy"
    cinder_volume: "ghcr.io/rackerlabs/genestack-images/cinder:2025.1-latest"
    cinder_volume_usage_audit: "ghcr.io/rackerlabs/genestack-images/cinder:2025.1-latest"
    db_drop: "ghcr.io/rackerlabs/genestack-images/openstack-client:latest"
    db_init: "ghcr.io/rackerlabs/genestack-images/openstack-client:latest"
    dep_check: "ghcr.io/rackerlabs/genestack-images/kubernetes-entrypoint:latest"
    image_repo_sync: null
    ks_endpoints: "ghcr.io/rackerlabs/genestack-images/openstack-client:latest"
    ks_service: "ghcr.io/rackerlabs/genestack-images/openstack-client:latest"
    ks_user: "ghcr.io/rackerlabs/genestack-images/openstack-client:latest"
    rabbit_init: null
    test: null

# NOTE: (brew) requests cpu/mem values based on a three node
# hyperconverged lab (/scripts/hyperconverged-lab.sh).
# limit values based on defaults from the openstack-helm charts unless defined
pod:
  affinity:
    anti:
      type:
        default: requiredDuringSchedulingIgnoredDuringExecution
  lifecycle:
    upgrades:
      deployments:
        revision_history: 3
        pod_replacement_strategy: RollingUpdate
        rolling_update:
          max_unavailable: 20%
          max_surge: 3
    disruption_budget:
      api:
        min_available: 0
    termination_grace_period:
      api:
        timeout: 60
  resources:
    enabled: true
    api:
      requests:
        memory: "384Mi"
        cpu: "100m"
      limits: {}
    scheduler:
      requests:
        memory: "192Mi"
        cpu: "100m"
      limits: {}
  security_context:
    cinder_api:
      container:
        cinder_api:
          allowPrivilegeEscalation: true
          privileged: true
    cinder_backup:
      container:
        cinder_backup:
          privileged: true
    cinder_volume:
      container:
        cinder_volume:
          privileged: true
  useHostNetwork:
    backup: true
    volume: true
  oslo_db:
    host_fqdn_override:
      default: mariadb-cluster-primary.openstack.svc.cluster.local
    hosts:
      default: mariadb-cluster-primary
  oslo_cache:
    host_fqdn_override:
      default: memcached.openstack.svc.cluster.local
    hosts:
      default: memcached
  oslo_messaging:
    host_fqdn_override:
      default: rabbitmq.openstack.svc.cluster.local
    hosts:
      default: rabbitmq-nodes

conf:
  # Below is an example for a cinder volume backend which is used when
  # creating a cinder volume type.  Since the choice of which underlying
  # backend storage solution you choose is cluster dependent (ceph, lvm, etc)
  # the section is to be use as an example only.  More inforamtion on
  # configuring a cinder backend can be found here:
  # https://docs.rackspacecloud.com/openstack-cinder-netapp-worker/?h=cinder+backend#2-cinder-backends
  backends: null
  #  lvmdriver-1:
  #    image_volume_cache_enabled: true
  #    iscsi_iotype: fileio
  #    iscsi_num_targets: 100
  #    lvm_type: default
  #    target_helper: tgtadm
  #    target_port: 3260
  #    target_protocol: iscsi
  #    volume_backend_name: LVM_iSCSI
  #    volume_clear: zero
  #    volume_driver: cinder_rxt.rackspace.RXTLVM
  #    volume_group: cinder-volumes-1
  policy:
    "volume_extension:types_extra_specs:read_sensitive": "rule:xena_system_admin_or_project_reader"
    "volume_extension:qos_specs_manage:get_all": "rule:xena_system_admin_or_project_member"
    "volume_extension:qos_specs_manage:get": "rule:xena_system_admin_or_project_member"
  cinder:
    DEFAULT:
      allow_availability_zone_fallback: true
      backup_compression_algorithm: zstd
      backup_swift_auth: per_user
      backup_swift_auth_version: 3
      default_availability_zone: az1
      default_volume_type: null
      enabled_backends: ""
      osapi_volume_workers: 2
      rootwrap_config: /etc/cinder/rootwrap.conf
      scheduler_default_filters: "AvailabilityZoneFilter,CapacityFilter,CapabilitiesFilter"
      storage_availability_zone: az1
      use_multipath_for_image_xfer: false
    cache:
      enabled: true
      backend: dogpile.cache.memcached
    database:
      connection_debug: 0
      connection_recycle_time: 600
      connection_trace: true
      idle_timeout: 3600
      mysql_sql_mode: {}
      use_db_reconnect: true
      pool_timeout: 60
      max_retries: -1
    barbican:
      barbican_endpoint_type: internal
    key_manager:
      backend: barbican
    keystone_authtoken:
      auth_type: password
      auth_version: v3
      memcache_security_strategy: ENCRYPT
      service_token_roles: service
      service_token_roles_required: true
      service_type: volumev3
    oslo_messaging_rabbit:
      amqp_durable_queues: false
      rabbit_ha_queues: false
      rabbit_quorum_queue: true
      rabbit_transient_quorum_queue: false
      use_queue_manager: false
      rabbit_interval_max: 10
      # Send more frequent heartbeats and fail unhealthy nodes faster
      # heartbeat_timeout / heartbeat_rate / 2.0 = 30 / 3 / 2.0 = 5
      # https://opendev.org/openstack/oslo.messaging/commit/36fb5bceabe08a982ebd52e4a8f005cd26fdf6b8
      heartbeat_rate: 3
      heartbeat_timeout_threshold: 60
      # Setting lower kombu_reconnect_delay should resolve issue with HA failing when one node is down
      # https://lists.openstack.org/pipermail/openstack-discuss/2023-April/033314.html
      # https://review.opendev.org/c/openstack/oslo.messaging/+/866617
      kombu_reconnect_delay: 0.5
  cinder_api_uwsgi:
    uwsgi:
      processes: 2
      threads: 1
  enable_iscsi: true
  logging:
    logger_root:
      handlers:
        - stdout
      level: INFO
  rabbitmq:
    policies: []
  rootwrap_filters:
    volume:
      pods:
        - volume
      content: |
        # cinder-rootwrap command filters for volume nodes
        # Based on cinder 2025.1 pip-installed volume.filters
        # with lvresize added for cinder-rxt LUKS header margin reclamation
        # This file should be owned by (and only-writeable by) the root user

        [Filters]
        # cinder/volume/targets/iscsi.py: target_helper '--op' ...
        iscsictl: CommandFilter, iscsictl, root
        cinder-rtstool: CommandFilter, cinder-rtstool, root

        # LVM related show commands
        pvs: EnvFilter, env, root, LC_ALL=C, pvs
        vgs: EnvFilter, env, root, LC_ALL=C, vgs
        lvs: EnvFilter, env, root, LC_ALL=C, lvs
        lvdisplay: EnvFilter, env, root, LC_ALL=C, lvdisplay

        # -LVM related show commands with suppress fd warnings
        pvs2: EnvFilter, env, root, LC_ALL=C, LVM_SUPPRESS_FD_WARNINGS=, pvs
        vgs2: EnvFilter, env, root, LC_ALL=C, LVM_SUPPRESS_FD_WARNINGS=, vgs
        lvs2: EnvFilter, env, root, LC_ALL=C, LVM_SUPPRESS_FD_WARNINGS=, lvs
        lvdisplay2: EnvFilter, env, root, LC_ALL=C, LVM_SUPPRESS_FD_WARNINGS=, lvdisplay

        # -LVM related show commands conf var
        pvs3: EnvFilter, env, root, LC_ALL=C, LVM_SYSTEM_DIR=, pvs
        vgs3: EnvFilter, env, root, LC_ALL=C, LVM_SYSTEM_DIR=, vgs
        lvs3: EnvFilter, env, root, LC_ALL=C, LVM_SYSTEM_DIR=, lvs
        lvdisplay3: EnvFilter, env, root, LC_ALL=C, LVM_SYSTEM_DIR=, lvdisplay

        # -LVM conf var with suppress fd_warnings
        pvs4: EnvFilter, env, root, LC_ALL=C, LVM_SYSTEM_DIR=, LVM_SUPPRESS_FD_WARNINGS=, pvs
        vgs4: EnvFilter, env, root, LC_ALL=C, LVM_SYSTEM_DIR=, LVM_SUPPRESS_FD_WARNINGS=, vgs
        lvs4: EnvFilter, env, root, LC_ALL=C, LVM_SYSTEM_DIR=, LVM_SUPPRESS_FD_WARNINGS=, lvs
        lvdisplay4: EnvFilter, env, root, LC_ALL=C, LVM_SYSTEM_DIR=, LVM_SUPPRESS_FD_WARNINGS=, lvdisplay

        # os-brick library commands
        privsep-rootwrap: RegExpFilter, privsep-helper, root, privsep-helper, --config-file, /etc/(?!\.\.).*, --privsep_context, os_brick.privileged.default, --privsep_sock_path, /tmp/.*

        # Privsep calls within cinder itself
        privsep-rootwrap-sys_admin: RegExpFilter, privsep-helper, root, privsep-helper, --config-file, /etc/(?!\.\.).*, --privsep_context, cinder.privsep.sys_admin_pctxt, --privsep_sock_path, /tmp/.*

        # cinder/brick/local_dev/lvm.py: 'lvcreate', '-L', sizestr, '-n', volume_name,..
        lvcreate: EnvFilter, env, root, LC_ALL=C, lvcreate
        lvcreate_lvmconf: EnvFilter, env, root, LVM_SYSTEM_DIR=, LC_ALL=C, lvcreate
        lvcreate_fdwarn: EnvFilter, env, root, LC_ALL=C, LVM_SUPPRESS_FD_WARNINGS=, lvcreate
        lvcreate_lvmconf_fdwarn: EnvFilter, env, root, LVM_SYSTEM_DIR=, LVM_SUPPRESS_FD_WARNINGS=, LC_ALL=C, lvcreate

        # cinder/volume/driver.py: 'dd', 'if=%s' % srcstr, 'of=%s' % deststr,...
        dd: CommandFilter, dd, root

        # cinder/volume/driver.py: 'lvremove', '-f', %s/%s % ...
        lvremove: CommandFilter, lvremove, root

        # cinder/brick/local_dev/lvm.py: 'lvextend', '-L' '%(new_size)s', ...
        lvextend: EnvFilter, env, root, LC_ALL=C, lvextend
        lvextend_lvmconf: EnvFilter, env, root, LVM_SYSTEM_DIR=, LC_ALL=C, lvextend
        lvextend_fdwarn: EnvFilter, env, root, LC_ALL=C, LVM_SUPPRESS_FD_WARNINGS=, lvextend
        lvextend_lvmconf_fdwarn: EnvFilter, env, root, LVM_SYSTEM_DIR=, LC_ALL=C, LVM_SUPPRESS_FD_WARNINGS=, lvextend

        # cinder/brick/local_dev/lvm.py: 'lvchange -a y -K <lv>'
        lvchange: CommandFilter, lvchange, root

        # cinder_rxt/rackspace.py: 'lvresize -f -L <size> <lv_path>'
        # Used for LUKS header margin reclamation after encrypted image copy
        lvresize: CommandFilter, lvresize, root

        # cinder/volume/driver.py: 'iscsiadm', '-m', 'discovery', '-t',...
        iscsiadm: CommandFilter, iscsiadm, root

        # cinder/volume/utils.py: utils.temporary_chown(path, 0)
        chown: CommandFilter, chown, root

        # cinder/volume/utils.py: copy_volume(..., ionice='...')
        ionice_1: ChainingRegExpFilter, ionice, root, ionice, -c[0-3], -n[0-7]
        ionice_2: ChainingRegExpFilter, ionice, root, ionice, -c[0-3]

        # cinder/volume/utils.py: setup_blkio_cgroup()
        cgexec: ChainingRegExpFilter, cgexec, root, cgexec, -g, blkio:\S+

        # cinder/image/image_utils.py
        qemu-img: EnvFilter, env, root, LC_ALL=C, qemu-img
        qemu-img_convert: CommandFilter, qemu-img, root
        qzip: CommandFilter, qzip, root
        gzip: CommandFilter, gzip, root

        # cinder/volume/nfs.py
        stat: CommandFilter, stat, root
        mount: CommandFilter, mount, root
        df: CommandFilter, df, root
        du: CommandFilter, du, root
        truncate: CommandFilter, truncate, root
        chmod: CommandFilter, chmod, root
        rm: CommandFilter, rm, root

        # cinder/volume/drivers/netapp/dataontap/nfs_base.py:
        netapp_nfs_find: RegExpFilter, find, root, find, ^[/]*([^/\0]+(/+)?)*$, -maxdepth, \d+, -name, img-cache.*, -amin, \+\d+

        # cinder/backup/drivers/nfs.py
        # cinder/backup/drivers/glusterfs.py
        chgrp: CommandFilter, chgrp, root

        # cinder/brick/initiator/connector.py:
        ls: CommandFilter, ls, root
        multipath: CommandFilter, multipath, root
        multipathd: CommandFilter, multipathd, root

        # cinder/volume/drivers/ibm/gpfs.py
        # cinder/volume/drivers/netapp/dataontap/nfs_base.py
        mv: CommandFilter, mv, root

        # cinder/volume/drivers/ibm/gpfs.py
        cp: CommandFilter, cp, root
        mmgetstate: CommandFilter, mmgetstate, root
        mmclone: CommandFilter, mmclone, root
        mmlsattr: CommandFilter, mmlsattr, root
        mmchattr: CommandFilter, mmchattr, root
        mmlsconfig: CommandFilter, mmlsconfig, root
        mmlsfs: CommandFilter, mmlsfs, root
        mmlspool: CommandFilter, mmlspool, root
        mkfs: CommandFilter, mkfs, root
        mmcrfileset: CommandFilter, mmcrfileset, root
        mmlsfileset: CommandFilter, mmlsfileset, root
        mmlinkfileset: CommandFilter, mmlinkfileset, root
        mmunlinkfileset: CommandFilter, mmunlinkfileset, root
        mmdelfileset: CommandFilter, mmdelfileset, root

        # cinder/volume/drivers/ibm/gpfs.py
        find_maxdepth_inum: RegExpFilter, find, root, find, ^[/]*([^/\0]+(/+)?)*$, -maxdepth, \d+, -ignore_readdir_race, -inum, \d+, -print0, -quit

        # cinder/volume/drivers/vzstorage.py
        pstorage-mount: CommandFilter, pstorage-mount, root
        pstorage: CommandFilter, pstorage, root
        ploop: CommandFilter, ploop, root

        # cinder/volume/drivers/quobyte.py
        mount.quobyte: CommandFilter, mount.quobyte, root
        umount.quobyte: CommandFilter, umount.quobyte, root

        # cinder/volume/drivers/dell_emc/powerstore/nfs.py
        dellfcopy: CommandFilter, dellfcopy, root

        # cinder/volume/flows/manager/create_volume.py: LUKS operations
        cryptsetup: CommandFilter, cryptsetup, root

dependencies:
  static:
    api:
      jobs:
        - cinder-db-sync
        - cinder-ks-user
        - cinder-ks-endpoints
    backup:
      jobs:
        - cinder-db-sync
        - cinder-ks-user
        - cinder-ks-endpoints
    db_sync:
      jobs: null
    scheduler:
      jobs:
        - cinder-db-sync
        - cinder-ks-user
        - cinder-ks-endpoints
    volume:
      jobs:
        - cinder-db-sync
        - cinder-ks-user
        - cinder-ks-endpoints
    volume_usage_audit:
      jobs:
        - cinder-db-sync
        - cinder-ks-user
        - cinder-ks-endpoints

endpoints:
  fluentd:
    namespace: fluentbit
  identity:
    port:
      api:
        default: 5000
        internal: 5000
        public: 80
        service: 5000
  image:
    port:
      api:
        default: 9292
        internal: 9292
        public: 80
        service: 9292
  oslo_db:
    host_fqdn_override:
      default: mariadb-cluster-primary.openstack.svc.cluster.local
    hosts:
      default: mariadb-cluster-primary
  oslo_cache:
    host_fqdn_override:
      default: memcached.openstack.svc.cluster.local
    hosts:
      default: memcached
  oslo_messaging:
    host_fqdn_override:
      default: rabbitmq.openstack.svc.cluster.local
    hosts:
      default: rabbitmq-nodes
  volume:
    port:
      api:
        default: 8776
        internal: 8776
        public: 80
        service: 8776
  volumev2:
    port:
      api:
        default: 8776
        internal: 8776
        public: 80
        service: 8776
  volumev3:
    port:
      api:
        default: 8776
        internal: 8776
        public: 80
        service: 8776

manifests:
  deployment_backup: false
  deployment_volume: false
  ingress_api: false
  job_bootstrap: false
  job_db_init: false
  job_rabbit_init: false
  job_storage_init: false
  pod_rally_test: false
  secret_db: false
  secret_ingress_tls: false
  secret_rabbitmq: false
  service_ingress_api: false

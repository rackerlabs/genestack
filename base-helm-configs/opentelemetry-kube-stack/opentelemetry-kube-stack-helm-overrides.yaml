            regex: '^(?P<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\.\d{3}) (?P<pid>\d+) (?P<severity>\w+) (?P<component>[\w\.\-]+) (?P<message>.*)$'

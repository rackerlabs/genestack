---

# Set the custom_host variable to the desired hostname for Grafana
# This is used to set the domain and root_url in the grafana.ini file
# and the value of the custom_host variable must be a valid domain.
custom_host: grafana.example.com

persistence:
  type: pvc
  enabled: true
  storageClassName: general
  accessModes:
    - ReadWriteMany

nodeSelector:
  openstack-control-plane: enabled

ingress:
  enabled: false

image:
  tag: "12.2.0"

grafana.ini:
  paths:
    data: /var/lib/grafana/
    logs: /var/log/grafana
    plugins: /var/lib/grafana/plugins
    provisioning: /etc/grafana/provisioning
  analytics:
    check_for_updates: true
  log:
    mode: console
  grafana_net:
    url: https://grafana.net
  server:
    domain: "{{ .Values.custom_host }}"  # Ref: custom_host variable above
    root_url: "https://{{ .Values.custom_host }}"  # Ref: custom_host variable above
  database:
    type: mysql
    host: mariadb-cluster.monitoring.svc:3306
    user: $__file{/etc/secrets/grafana-db/username}
    password: $__file{/etc/secrets/grafana-db/password}
    name: grafana

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
        isDefault: true
        editable: true

      - name: Loki
        uid: loki
        type: loki
        access: proxy
        url: http://loki-gateway.monitoring.svc.cluster.local:80
        editable: true

      - name: Tempo
        uid: tempo
        type: tempo
        access: proxy
        url: http://tempo.monitoring.svc.cluster.local:3200
        editable: true
        jsonData:
          serviceMap:
            datasourceUid: prometheus

          nodeGraph:
            enabled: true

          tracesToLogsV2:
            datasourceUid: loki
            spanStartTimeShift: "-5m"
            spanEndTimeShift: "5m"
            tags:
              - key: service.name
                value: job
              - key: service.namespace
                value: namespace
              - key: k8s.pod.name
                value: pod
              - key: k8s.namespace.name
                value: namespace
            filterByTraceID: true
            filterBySpanID: false

          tracesToMetrics:
            datasourceUid: prometheus
            spanStartTimeShift: "-15m"
            spanEndTimeShift: "15m"
            tags:
              - key: service.name
                value: service
              - key: service.namespace
                value: namespace
              - key: k8s.pod.name
                value: pod
              - key: k8s.namespace.name
                value: namespace
            queries:
              - name: "Request rate"
                query: "sum(rate(traces_spanmetrics_calls_total{$$__tags}[5m]))"
              - name: "Error rate"
                query: "sum(rate(traces_spanmetrics_calls_total{$$__tags,status_code=\"STATUS_CODE_ERROR\"}[5m]))"
              - name: "Latency p95"
                query: "histogram_quantile(0.95, sum by (le) (rate(traces_spanmetrics_latency_bucket{$$__tags}[5m])))"

          search:
            hide: false

          traceQuery:
            timeShiftEnabled: true
            spanStartTimeShift: "-1h"
            spanEndTimeShift: "1h"

          spanBar:
            type: "Tag"
            tag: "http.path"


plugins:
  - camptocamp-prometheus-alertmanager-datasource
  - yesoreyeram-infinity-datasource

extraSecretMounts:
  - name: grafana-db-secret-mount
    secretName: grafana-db
    defaultMode: 0440
    mountPath: /etc/secrets/grafana-db
    readOnly: true

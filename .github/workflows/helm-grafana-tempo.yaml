---
name: Helm GitHub Actions for Tempo

on:
  pull_request:
    paths:
      - base-helm-configs/tempo/**
      - base-kustomize/tempo/**
      - .github/workflows/helm-grafana-tempo.yaml
jobs:
  helm:
    strategy:
      matrix:
        overlays:
          - base
    name: Helm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: azure/setup-helm@v3
        with:
          version: v3.14.3
          token: ${{ secrets.GITHUB_TOKEN }}
        id: helm
      - name: Add grafana repo to helm
        run: |
          ${{ steps.helm.outputs.helm-path }} repo add grafana https://grafana.github.io/helm-charts
          ${{ steps.helm.outputs.helm-path }} repo update
      - name: Run Helm Template
        run: |
          ${{ steps.helm.outputs.helm-path }} template tempo grafana/tempo \
            --create-namespace \
            --namespace=monitoring \
            -f ${{ github.workspace }}/base-helm-configs/tempo/tempo-helm-overrides.yaml \
            --post-renderer ${{ github.workspace }}/base-kustomize/kustomize.sh \
            --post-renderer-args tempo/${{ matrix.overlays }} > /tmp/rendered.yaml
      - name: Return helm Build
        uses: actions/upload-artifact@v4
        with:
          name: helm-tempo-artifact-${{ matrix.overlays }}
          path: /tmp/rendered.yaml

---
name: Helm GitHub Actions for Opentelemetry

on:
  pull_request:
    paths:
      - base-helm-configs/opentelemetry-kube-stack/**
      - base-kustomize/opentelemetry-kube-stack/**
      - .github/workflows/helm-opentelemetry-kube-stack.yaml
jobs:
  helm:
    strategy:
      matrix:
        overlays:
          - base
    name: Helm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: azure/setup-helm@v3
        with:
          version: v3.14.3
          token: ${{ secrets.GITHUB_TOKEN }}
        id: helm
      - name: Add open-telemetry repo to helm
        run: |
          ${{ steps.helm.outputs.helm-path }} repo add open-telemetry https://open-telemetry.github.io/opentelemetry-helm-charts
          ${{ steps.helm.outputs.helm-path }} repo update
      - name: Run Helm Template
        run: |
          ${{ steps.helm.outputs.helm-path }} template opentelemetry open-telemetry/opentelemetry-kube-stack \
            --create-namespace \
            --namespace=monitoring \
            -f ${{ github.workspace }}/base-helm-configs/opentelemetry-kube-stack/opentelemetry-kube-stack-helm-overrides.yaml \
            --post-renderer ${{ github.workspace }}/base-kustomize/kustomize.sh \
            --post-renderer-args opentelemetry-kube-stack/${{ matrix.overlays }} > /tmp/rendered.yaml
      - name: Return helm Build
        uses: actions/upload-artifact@v4
        with:
          name: helm-opentelemetry-artifact-${{ matrix.overlays }}
          path: /tmp/rendered.yaml

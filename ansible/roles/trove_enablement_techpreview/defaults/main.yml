---
# defaults file for trove_enablement_techpreview

# =========================================================================
# Trove guest image (built with diskimage-builder, mirroring Manila pattern)
# =========================================================================
# Guest image (built with diskimage-builder, mirroring Manila pattern).
# trove_guest_image_name embeds the OS release so changing
# trove_guest_image_os_release triggers an automatic rebuild — the
# state-detection step looks up the image by name, sees it doesn't
# exist, and runs disk-image-create.
trove_guest_image_os_release: noble
trove_mysql_version: "8.4"
# Embed mysql_version + os_release in the image name so different
# datastore versions or Ubuntu bases don't collide on a single Glance
# image.
trove_guest_image_name: "trove-mysql-{{ trove_mysql_version }}-{{ trove_guest_image_os_release }}"
trove_dib_distribution_mirror: "http://mirror.rackspace.com/ubuntu"
# OpenStack release branch to clone for DIB elements + guest-agent.
# Must match the trove server-side image (api/taskmanager/conductor)
# in trove-helm-overrides.yaml: a 2026.1 guest agent talking to a
# 2025.1 conductor produces silently-dropped RPC heartbeats — the
# encrypted-RPC implementation changed between 23.x and 25.x, so the
# conductor cannot decrypt the agent's messages, the periodic status
# update never lands in the DB, and the taskmanager polling
# `_service_is_active` times out at 30 min with `Build error:
# guestagent timeout` even though prepare succeeded and mysqld is
# healthy. The my.cnf "unknown variable default_authentication_plugin"
# panic that motivated the original bump is rendered server-side, so
# the configmap-overlay (trove-mysql-config-template-override) fixes
# it without the guest needing 2026.1.
trove_openstack_release: "2025.1"

# =========================================================================
# Trove datastore
# =========================================================================
trove_datastore_name: mysql
trove_datastore_version_name: "8.4"
trove_datastore_packages: "mysql-server"

# =========================================================================
# Trove networking and access
# =========================================================================
trove_keypair_name: trove-access-keypair
trove_secgroup_name: trove-access-secgroup
trove_secgroup_remote_ip: "0.0.0.0/0"
trove_flat_network_name: flat
trove_mgmt_network_name: trove-mgmt-net
trove_mgmt_subnet_name: trove-mgmt-subnet
trove_services_secgroup_name: trove-services-secgroup
trove_ssh_key_filename: trove_ssh_key

# =========================================================================
# Trove management overlay network (geneve, no physnet)
# =========================================================================
# Trove management overlay network (geneve, no physnet)
# Per-chassis "anchor" pods on this overlay run haproxy proxying
# RabbitMQ + Keystone to trove guest VMs (see trove-mgmt-bridge
# DaemonSet).
#
# Layout of 10.0.0.0/20 inside the trove-mgmt subnet:
#   10.0.0.0-10.0.0.8       spare reserved IP addresses (low range)
#   10.0.0.9                external gateway
#   10.0.0.10               trove-services VIP anchor IP address
#   10.0.0.11-10.0.0.255    spare reserved IP addresses (high range)
#   10.0.1.0 - 10.0.15.255  guest VM mgmt-NIC IP addresses
trove_mgmt_subnet_cidr: 10.0.0.0/20
trove_mgmt_subnet_gateway: 10.0.0.9
trove_mgmt_pool_start: 10.0.1.0
trove_mgmt_pool_end: 10.0.15.254
trove_mgmt_router_name: trove-mgmt-router
trove_mgmt_router_port_name: trove-mgmt-router-port

# Anchor IP that trove guest cloud-init injects for rabbitmq /
# keystone-api hostnames. First anchor (NET_PREFIX.<offset>). For HA
# this can later be swapped for an OVN load_balancer VIP across all
# anchors.
trove_services_anchor_ip: 10.0.0.10
trove_mgmt_anchor_base_offset: 10

# Build paths and environment
# =========================================================================
trove_tmp_dir: /tmp
trove_build_dir: "{{ trove_tmp_dir }}/trove-image-build"
trove_venv_dir: "{{ trove_tmp_dir }}/trove-image-build/trove-dib-build"
genestack_rc: /opt/genestack/scripts/genestack.rc
genestack_venv: /home/ubuntu/.venvs/genestack
ubuntu_home: /home/ubuntu
trove_region_name: RegionOne
trove_os_endpoint_type: internal
os_cloud: default

# =========================================================================
# Helm config — driver template to merge into the existing overrides file.
# The selected template is deep-merged into the trove-helm-overrides.yaml
# that already lives at /etc/genestack/helm-configs/trove/.
# =========================================================================
trove_helm_config_template: trove_default_helm_config.yaml
helm_config_base: /etc/genestack/helm-configs

# =========================================================================
# Gateway and kustomize
# =========================================================================
# The region component used in gateway hostnames
# (e.g. trove.api.<region_lower>.rackspacecloud.com).
# Auto-detected from /etc/genestack/helm-configs/global_overrides/endpoints.yaml
# at runtime; this default is the fallback.
trove_gateway_region_lower: ""

# =========================================================================
# Force / mode flags for image builder
# =========================================================================
# Default (no flags):
#   Idempotent — skip image build if the Glance image already exists.
#
# force_rebuild_image=true:
#   Deletes existing Glance image, rebuilds, re-uploads.
#
# force_full_recreation=true (nuclear):
#   Deletes and re-creates OpenStack keypair, security group,
#   rebuilds guest image, re-uploads, re-registers datastore.
force_rebuild_image: false
force_full_recreation: false

# trove_force_recreate_secrets=true:
#   Deletes and regenerates the four Trove K8s secrets (rabbitmq, db,
#   admin, ssh) and syncs new RabbitMQ/MariaDB passwords into the
#   running backing services.  Leave false unless you know you need to
#   rotate — regeneration can break running clusters.
trove_force_recreate_secrets: false

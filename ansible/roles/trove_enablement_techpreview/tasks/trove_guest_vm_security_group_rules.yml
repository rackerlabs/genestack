- name: Print the extra variable
  ansible.builtin.debug:
    msg: "The lab_name_prefix variable is {{ lab_name_prefix }}"

- name: Check if {{ lab_name_prefix }}-http-secgroup rule for port 5672 exists
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      source {{ genestack_venv }}/bin/activate
      openstack security group show {{ lab_name_prefix }}-http-secgroup -f json 2>/dev/null | \
        jq -r '.rules[].port_range_max' | grep -q 5672
    executable: /bin/bash
  environment:
    HOME: "{{ ubuntu_home }}"
  register: _sec_group_rule_5672_check
  changed_when: false
  failed_when: false

- name: Check if {{ lab_name_prefix }}-http-secgroup rule for port 5000 exists
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      source {{ genestack_venv }}/bin/activate
      openstack security group show {{ lab_name_prefix }}-http-secgroup -f json 2>/dev/null | \
        jq -r '.rules[].port_range_max' | grep -q 5000
    executable: /bin/bash
  environment:
    HOME: "{{ ubuntu_home }}"
  register: _sec_group_rule_5000_check
  changed_when: false
  failed_when: false

- name: Create {{ lab_name_prefix }}-http-secgroup rule for port 5672
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      source {{ genestack_venv }}/bin/activate
      openstack security group rule create {{ lab_name_prefix }}-http-secgroup \
        --protocol tcp --ingress --dst-port 5672 \
        --remote-ip {{ compute_subnet_cidr }} \
        --description "RabbitMQ for Trove guest VMs (flat network)"
      openstack security group rule create {{ lab_name_prefix }}-http-secgroup \
        --protocol tcp --ingress --dst-port 5672 \
        --remote-ip {{ mgmt_subnet_cidr }} \
        --description "RabbitMQ for Trove guest VMs (mgmt network / SNAT)"
    executable: /bin/bash
  environment:
    HOME: "{{ ubuntu_home }}"
  when:
    - _sec_group_rule_5672_check.rc != 0

- name: Create {{ lab_name_prefix }}-http-secgroup rule for port 5000
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      source {{ genestack_venv }}/bin/activate
      openstack security group rule create {{ lab_name_prefix }}-http-secgroup \
        --protocol tcp --ingress --dst-port 5000 \
        --remote-ip ${COMPUTE_SUBNET_CIDR:-192.168.102.0/24} \
        --description "Keystone for Trove guest VMs (flat network)"
      openstack security group rule create {{ lab_name_prefix }}-http-secgroup \
        --protocol tcp --ingress --dst-port 5000 \
        --remote-ip ${MGMT_SUBNET_CIDR:-192.168.100.0/24} \
        --description "Keystone for Trove guest VMs (mgmt network / SNAT)"
    executable: /bin/bash
  environment:
    HOME: "{{ ubuntu_home }}"
  when:
    - _sec_group_rule_5000_check.rc != 0

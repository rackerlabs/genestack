---
# Trove helm config fragment — deep-merged into trove-helm-overrides.yaml
# by the trove_enablement_techpreview role.
#
# This template resolves runtime values: network ID, security group ID,
# keypair name, and guest image ID.

images:
  tags:
    bootstrap: "ghcr.io/rackerlabs/genestack-images/openstack-client:latest"
    trove_api: "ghcr.io/rackerlabs/genestack-images/trove:2025.1-latest"
    trove_conductor: "ghcr.io/rackerlabs/genestack-images/trove:2025.1-latest"
    trove_taskmanager: "ghcr.io/rackerlabs/genestack-images/trove:2025.1-latest"
    trove_db_sync: "ghcr.io/rackerlabs/genestack-images/trove:2025.1-latest"
    db_drop: "ghcr.io/rackerlabs/genestack-images/openstack-client:latest"
    db_init: "ghcr.io/rackerlabs/genestack-images/openstack-client:latest"
    dep_check: "ghcr.io/rackerlabs/genestack-images/kubernetes-entrypoint:latest"
    image_repo_sync: null
    ks_endpoints: "ghcr.io/rackerlabs/genestack-images/openstack-client:latest"
    ks_service: "ghcr.io/rackerlabs/genestack-images/openstack-client:latest"
    ks_user: "ghcr.io/rackerlabs/genestack-images/openstack-client:latest"
    rabbit_init: null
    test: null

conf:
  trove:
    DEFAULT:
      management_networks: "{{_trove_mgmt_network_id.stdout | trim}}"
      management_security_groups: "{{_trove_secgroup_id.stdout | trim}}"
      nova_keypair: "{{trove_keypair_name}}"
      default_datastore: "{{trove_datastore_name}}"
      network_driver: trove.network.neutron.NeutronDriver
      taskmanager_manager: trove.taskmanager.manager.Manager
      use_nova_server_config_drive: true
      trove_volume_support: true
      volume_support: true
      volume_fstype: ext4
      cinder_volume_type: Standard
      enable_volume_az: true
    mysql:
      volume_support: true
    network:
      enable_access_check: false
      # network_isolation=true makes the guest agent bring down the
      # customer-tenant NIC during prepare, which kills internet access
      # the agent needs to docker pull the datastore image. Keep it off
      # so ens3 stays up for prepare-time traffic. (When the datastore
      # image is pre-baked into the guest qcow2 by guest_image_builder,
      # the guest doesn't need outbound internet, but ens3 must still
      # be up for the agent's networking probes.)
      network_isolation: false
    oslo_messaging_rabbit:
      # Path-B alignment: keep classic non-durable queues on both
      # conductor and the guest-agent transport.conf so queue/exchange
      # redeclares don't fail with PRECONDITION_FAILED. Set true on
      # both sides simultaneously to enable quorum queues.
      rabbit_quorum_queue: false
      rabbit_transient_quorum_queue: false
      amqp_durable_queues: false

pod:
  mounts:
    trove_taskmanager:
      init_container: null
      trove_taskmanager:
        volumeMounts:
          - name: trove-guest-cloudinit
            mountPath: /etc/trove/cloudinit
            readOnly: true
          # Workaround until ghcr.io/rackerlabs/genestack-images/trove
          # carries a 2026.1+ template. The 2025.1-latest image's
          # mysql/config.template emits an unconditional
          # `default_authentication_plugin = mysql_native_password`,
          # which mysqld 8.4 rejects. Overlay the patched template so
          # the server-side render produces a valid my.cnf.
          - name: trove-mysql-config-template
            mountPath: /var/lib/openstack/lib/python3.12/site-packages/trove/templates/mysql/config.template
            subPath: config.template
            readOnly: true
        volumes:
          - name: trove-guest-cloudinit
            configMap:
              name: trove-guest-cloudinit
          - name: trove-mysql-config-template
            configMap:
              name: trove-mysql-config-template-override
    trove_conductor:
      trove_conductor:
        volumeMounts:
          - name: trove-mysql-config-template
            mountPath: /var/lib/openstack/lib/python3.12/site-packages/trove/templates/mysql/config.template
            subPath: config.template
            readOnly: true
        volumes:
          - name: trove-mysql-config-template
            configMap:
              name: trove-mysql-config-template-override

- name: "Restart cinder-volume-backend systemd services"
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: restarted
    daemon_reload: true
    enabled: true
  loop:
    - cinder-volume-{{ cinder_worker_name }}

- name: "Restart cinder-volume systemd services"
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: restarted
    daemon_reload: true
    enabled: true
  loop:
    - cinder-volume

- name: Reload cinder-volume-tgt systemd service
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: reloaded
    daemon_reload: true
    enabled: true
  loop:
    - tgt.service

- name: Restart cinder-volume and cinder-backup systemd services
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: restarted
    daemon_reload: true
    enabled: true
  loop:
    - cinder-volume
    - cinder-volume-usage-audit
    - cinder-backup
    - iscsid.service

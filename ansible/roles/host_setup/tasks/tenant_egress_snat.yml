---
# Inner-cloud tenant egress to the public internet.
#
# Each tenant's neutron router has an external_gateway_info IP from the
# lab's "flat" external network (default 192.168.102.0/24). OVN SNATs
# tenant traffic to that IP and forwards it onto the flat network.
# Kube-ovn maps the flat physnet to the `br-ex` OVS bridge (see
# `ovs-vsctl get Open_vSwitch . external_ids:ovn-bridge-mappings` →
# `physnet1:br-ex`), but on the hosts `br-ex` is admin DOWN with no
# IP, so the flat L2 segment is essentially a sink. The OVN router
# ARPs for its subnet gateway (192.168.102.1) and nobody answers —
# packets die at hop 2 from a tenant guest.
#
# Fix: expose the OVS bridge to the host's L3. OVS auto-creates a
# Linux netdev matching the bridge name; we bring it UP and assign
# the flat subnet's gateway_ip to it. The OVN router then ARPs
# successfully, packets enter the host's L3, our nft postrouting
# MASQUERADE rewrites the source IP to the host's real routable
# address (default route via enp3s0 / 192.168.100.1), and conntrack
# tracks the reply path. From the tenant guest's perspective: working
# outbound to 8.8.8.8, no per-tenant or per-instance fix required.
#
# The L3 gateway IP can live on only one host at a time (no IP
# conflicts), so we pin it to `lab_flat_external_gateway_host`
# (default the overseer). Every host still gets the nft MASQUERADE
# table installed so that if the gateway moves you only need to flip
# `lab_flat_external_gateway_host`. (For HA, layer keepalived on top
# of the gateway IP; out of scope for the lab.)
#
# Implementation notes:
# - Pure nftables, owned table `inet genestack-snat` so we don't
#   collide with kube-proxy/docker/ovn rules in `ip nat`.
# - Each task has explicit `tags:` because Ansible's `include_tasks`
#   tag inheritance is dynamic and only applies tags to the include
#   directive itself, not the inner tasks.
# - Designated-gateway L3 plumbing is in the same systemd unit as the
#   MASQUERADE so a single `systemctl restart genestack-tenant-snat`
#   re-applies everything.
#
# Disable in production where the flat external network is routable
# upstream and the host shouldn't NAT for it; toggle via
# `lab_tenant_egress_snat_enabled`.

- name: Set inner-cloud tenant egress facts
  ansible.builtin.set_fact:
    _tenant_egress_prefix_len: "{{ lab_flat_external_cidr.split('/')[1] }}"
    _tenant_egress_is_gateway_host: "{{ inventory_hostname == lab_flat_external_gateway_host }}"
  when: lab_tenant_egress_snat_enabled | bool
  tags:
    - hosts-config
    - tenant-egress-snat

- name: Ensure nftables package is installed
  ansible.builtin.apt:
    name: nftables
    state: present
    update_cache: false
  when: lab_tenant_egress_snat_enabled | bool
  tags:
    - hosts-config
    - tenant-egress-snat

- name: Enable IPv4 forwarding for inner-cloud tenant egress
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    state: present
    sysctl_set: true
    reload: true
    sysctl_file: /etc/sysctl.d/99-genestack-tenant-snat.conf
  when: lab_tenant_egress_snat_enabled | bool
  tags:
    - hosts-config
    - tenant-egress-snat

- name: Ensure nftables drop-in directory exists
  ansible.builtin.file:
    path: /etc/nftables.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: lab_tenant_egress_snat_enabled | bool
  tags:
    - hosts-config
    - tenant-egress-snat

- name: Write genestack-snat nftables ruleset
  ansible.builtin.copy:
    dest: /etc/nftables.d/genestack-tenant-snat.nft
    owner: root
    group: root
    mode: "0644"
    content: |
      # Managed by genestack hcl-builder-ansible / host_setup role.
      # SNAT inner-cloud tenant egress through the hyperconverged host.
      # Lives in its own `inet genestack-snat` table so we don't
      # interleave with kube-proxy/docker/ovn rules in `ip nat`.
      table inet genestack-snat {
          chain postrouting {
              type nat hook postrouting priority srcnat; policy accept;
              ip saddr {{ lab_flat_external_cidr }} ip daddr != {{ lab_flat_external_cidr }} counter masquerade comment "genestack-tenant-snat"
          }
      }
  when: lab_tenant_egress_snat_enabled | bool
  tags:
    - hosts-config
    - tenant-egress-snat

- name: Install genestack-tenant-snat systemd unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/genestack-tenant-snat.service
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Genestack lab: flat-external L3 gateway + MASQUERADE ({{ lab_flat_external_cidr }})
      After=network-online.target ovs-vswitchd.service nftables.service
      Wants=network-online.target

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      # Idempotency: tear down any prior instance of our nft table
      # before re-loading. `-` ignores failure when not present.
      ExecStartPre=-/usr/sbin/nft delete table inet genestack-snat
      ExecStart=/usr/sbin/nft -f /etc/nftables.d/genestack-tenant-snat.nft
      {% if _tenant_egress_is_gateway_host | default(false) | bool %}
      # Designated L3 gateway for flat external. OVS auto-creates a
      # Linux netdev matching the bridge name; bring it up and pin the
      # flat subnet's gateway_ip on it so OVN routers can ARP-resolve
      # their next-hop and packets enter the host's L3 path.
      ExecStart=/usr/sbin/ip link set {{ lab_flat_external_bridge }} up
      ExecStart=-/usr/sbin/ip addr add {{ lab_flat_external_gateway_ip }}/{{ _tenant_egress_prefix_len }} dev {{ lab_flat_external_bridge }}
      ExecStop=-/usr/sbin/ip addr del {{ lab_flat_external_gateway_ip }}/{{ _tenant_egress_prefix_len }} dev {{ lab_flat_external_bridge }}
      {% endif %}
      ExecStop=-/usr/sbin/nft delete table inet genestack-snat

      [Install]
      WantedBy=multi-user.target
  when: lab_tenant_egress_snat_enabled | bool
  tags:
    - hosts-config
    - tenant-egress-snat

# Unconditionally reload+restart on every run instead of going through
# `notify` handlers. Rationale: the previous handler-based design got
# stuck across runs — if a verify task failed mid-play, the queued
# `Reload genestack-tenant-snat` handler was suppressed on that host,
# the unit file on disk was updated but never (re)loaded into systemd,
# and subsequent runs found no diff so no notify fired and the host
# stayed on stale ExecStart content forever. Hard to recover from
# without manually `systemctl restart`-ing.
#
# Since this is a `Type=oneshot RemainAfterExit=yes` service, restart
# means: run ExecStop (nft delete + ip addr del), then run ExecStart
# (nft -f + ip link up + ip addr add). It's milliseconds and produces
# the same end state as the previous run — restarting on every play
# is cheap, deterministic, and self-healing.
- name: Reload systemd and (re)start genestack-tenant-snat
  ansible.builtin.systemd:
    name: genestack-tenant-snat.service
    enabled: true
    state: restarted
    daemon_reload: true
  when: lab_tenant_egress_snat_enabled | bool
  tags:
    - hosts-config
    - tenant-egress-snat

- name: Verify nft table is loaded
  ansible.builtin.command:
    cmd: nft list table inet genestack-snat
  changed_when: false
  when: lab_tenant_egress_snat_enabled | bool
  tags:
    - hosts-config
    - tenant-egress-snat

- name: Verify flat-external gateway IP is on br-ex (gateway host only)
  ansible.builtin.command:
    cmd: ip -4 -o addr show dev {{ lab_flat_external_bridge }}
  register: _flat_bridge_addr
  changed_when: false
  failed_when:
    - (lab_flat_external_gateway_ip ~ "/" ~ _tenant_egress_prefix_len) not in _flat_bridge_addr.stdout
  when:
    - lab_tenant_egress_snat_enabled | bool
    - _tenant_egress_is_gateway_host | default(false) | bool
  tags:
    - hosts-config
    - tenant-egress-snat

# Cleanup path: if the lab variable is flipped off (or this role is
# imported into a production playbook), tear the rule down so the host
# doesn't silently keep NATing.
- name: Cleanup genestack-tenant-snat when feature is disabled
  when: not (lab_tenant_egress_snat_enabled | bool)
  tags:
    - hosts-config
    - tenant-egress-snat
  block:
    - name: Stop and disable genestack-tenant-snat
      ansible.builtin.systemd:
        name: genestack-tenant-snat.service
        enabled: false
        state: stopped
      failed_when: false
    - name: Remove genestack-tenant-snat unit file
      ansible.builtin.file:
        path: /etc/systemd/system/genestack-tenant-snat.service
        state: absent
      notify: Systemd daemon reload
    - name: Remove genestack-tenant-snat nft drop-in
      ansible.builtin.file:
        path: /etc/nftables.d/genestack-tenant-snat.nft
        state: absent
    - name: Remove sysctl drop-in
      ansible.builtin.file:
        path: /etc/sysctl.d/99-genestack-tenant-snat.conf
        state: absent

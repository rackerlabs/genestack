---
# Trove helm config fragment — deep-merged into trove-helm-overrides.yaml
# by the trove_enablement role.
#
# This template resolves runtime values: network ID, security group ID,
# keypair name, and guest image ID.

conf:
  trove:
    DEFAULT:
      management_networks: "{{ _trove_mgmt_network_id.stdout | trim }}"
      management_security_groups: "{{ _trove_secgroup_id.stdout | trim }}"
      nova_keypair: "{{ trove_keypair_name }}"
      default_datastore: "{{ trove_datastore_name }}"
      network_driver: trove.network.neutron.NeutronDriver
      taskmanager_manager: trove.taskmanager.manager.Manager
      use_nova_server_config_drive: true
      trove_volume_support: true
      volume_support: true
      volume_fstype: ext4
      cinder_volume_type: Standard
      enable_volume_az: true
    mysql:
      volume_support: true

pod:
  mounts:
    trove_taskmanager:
      init_container: null
      trove_taskmanager:
        volumeMounts:
          - name: trove-guest-cloudinit
            mountPath: /etc/trove/cloudinit
            readOnly: true
          # Workaround until ghcr.io/rackerlabs/genestack-images/trove
          # carries a 2026.1+ template. The 2025.1-latest image's
          # mysql/config.template emits an unconditional
          # `default_authentication_plugin = mysql_native_password`,
          # which mysqld 8.4 rejects. Overlay the patched template so
          # the server-side render produces a valid my.cnf.
          - name: trove-mysql-config-template
            mountPath: /var/lib/openstack/lib/python3.12/site-packages/trove/templates/mysql/config.template
            subPath: config.template
            readOnly: true
        volumes:
          - name: trove-guest-cloudinit
            configMap:
              name: trove-guest-cloudinit
          - name: trove-mysql-config-template
            configMap:
              name: trove-mysql-config-template-override
    trove_conductor:
      trove_conductor:
        volumeMounts:
          - name: trove-mysql-config-template
            mountPath: /var/lib/openstack/lib/python3.12/site-packages/trove/templates/mysql/config.template
            subPath: config.template
            readOnly: true
        volumes:
          - name: trove-mysql-config-template
            configMap:
              name: trove-mysql-config-template-override

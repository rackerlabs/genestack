---
service:
  name: gnocchi
  version: ~

chart: {}

secrets:
  - helm_key: "conf.ceph.admin_keyring"
    value_from:
      type: secret_data
      namespace: rook-ceph
      secret_name: rook-ceph-admin-keyring
      data_key: keyring
    helm_flag: --set

  - helm_key: "conf.gnocchi.keystone_authtoken.memcache_secret_key"
    source_secret: os-memcached
    source_namespace: openstack
    data_key: memcache_secret_key
    helm_flag: --set

  - helm_key: "endpoints.oslo_cache.auth.memcache_secret_key"
    source_secret: os-memcached
    source_namespace: openstack
    data_key: memcache_secret_key
    helm_flag: --set

  - helm_key: "endpoints.identity.auth.admin.password"
    source_secret: keystone-admin
    source_namespace: openstack
    data_key: password
    helm_flag: --set

  - helm_key: "endpoints.identity.auth.gnocchi.password"
    source_secret: gnocchi-admin
    source_namespace: openstack
    data_key: password
    rotate_with_service: true
    helm_flag: --set

  - helm_key: "endpoints.oslo_db.auth.admin.password"
    source_secret: mariadb
    source_namespace: openstack
    data_key: root-password
    helm_flag: --set

  - helm_key: "endpoints.oslo_db.auth.gnocchi.password"
    source_secret: gnocchi-db-password
    source_namespace: openstack
    data_key: password
    rotate_with_service: true
    helm_flag: --set

  - helm_key: "endpoints.oslo_db_postgresql.auth.admin.password"
    source_secret: postgres.postgres-cluster.credentials.postgresql.acid.zalan.do
    source_namespace: openstack
    data_key: password
    helm_flag: --set

  - helm_key: "endpoints.oslo_db_postgresql.auth.gnocchi.password"
    source_secret: gnocchi-pgsql-password
    source_namespace: openstack
    data_key: password
    rotate_with_service: true
    helm_flag: --set

---
service:
  name: freezer
  version: ~

chart: {}

secrets:
  - helm_key: "endpoints.identity.auth.admin.password"
    source_secret: keystone-admin
    source_namespace: openstack
    data_key: password
    helm_flag: --set

  - helm_key: "endpoints.identity.auth.freezer.password"
    source_secret: freezer-admin
    source_namespace: openstack
    data_key: password
    rotate_with_service: true
    helm_flag: --set

  - helm_key: "endpoints.identity.auth.test.password"
    source_secret: freezer-keystone-test-password
    source_namespace: openstack
    data_key: password
    rotate_with_service: true
    helm_flag: --set

  - helm_key: "endpoints.identity.auth.service.password"
    source_secret: freezer-keystone-service-password
    source_namespace: openstack
    data_key: password
    rotate_with_service: true
    helm_flag: --set

  - helm_key: "endpoints.oslo_db.auth.admin.password"
    source_secret: mariadb
    source_namespace: openstack
    data_key: root-password
    helm_flag: --set

  - helm_key: "endpoints.oslo_db.auth.freezer.password"
    source_secret: freezer-db-password
    source_namespace: openstack
    data_key: password
    rotate_with_service: true
    helm_flag: --set

  - helm_key: "endpoints.oslo_cache.auth.memcache_secret_key"
    source_secret: os-memcached
    source_namespace: openstack
    data_key: memcache_secret_key
    helm_flag: --set

  - helm_key: "conf.freezer.keystone_authtoken.memcache_secret_key"
    source_secret: os-memcached
    source_namespace: openstack
    data_key: memcache_secret_key
    helm_flag: --set

---
service:
  name: openstack-exporter
  namespace: monitoring
  version: ~

  family: ""

chart:
  repo_name: ~
  repo_url: ~
  service_name: openstack-api-exporter
  global_overrides: false

secrets:
  - helm_key: "endpoints.identity.auth.admin.password"
    source_secret: keystone-auth-openstack-exporter
    source_namespace: monitoring
    data_key: AUTH_URL
    rotate_with_service: true
    helm_flag: --set

post_install_actions:
  - type: get_by_label_optional
    namespace: monitoring
    resource: pods
    selector: app=openstack-exporter
    not_found_message: openstack-exporter not ready yet

---
service:
  name: placement
  version: ~

chart: {}

secrets:
  - helm_key: "endpoints.identity.auth.admin.password"
    source_secret: keystone-admin
    source_namespace: openstack
    data_key: password
    helm_flag: --set

  - helm_key: "endpoints.identity.auth.placement.password"
    source_secret: placement-admin
    source_namespace: openstack
    data_key: password
    helm_flag: --set

  - helm_key: "endpoints.oslo_db.auth.admin.password"
    source_secret: mariadb
    source_namespace: openstack
    data_key: root-password
    helm_flag: --set

  - helm_key: "endpoints.oslo_db.auth.placement.password"
    source_secret: placement-db-password
    source_namespace: openstack
    data_key: password
    helm_flag: --set

  - helm_key: "endpoints.oslo_db.auth.nova_api.password"
    source_secret: nova-db-password
    source_namespace: openstack
    data_key: password
    helm_flag: --set

  - helm_key: "endpoints.oslo_cache.auth.memcache_secret_key"
    source_secret: os-memcached
    source_namespace: openstack
    data_key: memcache_secret_key
    helm_flag: --set

  - helm_key: "conf.placement.keystone_authtoken.memcache_secret_key"
    source_secret: os-memcached
    source_namespace: openstack
    data_key: memcache_secret_key
    helm_flag: --set

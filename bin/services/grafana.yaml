---
service:
  name: grafana
  namespace: monitoring
  version: ~

  family: ""

chart:
  repo_name: grafana
  repo_url: https://grafana.github.io/helm-charts
  global_overrides: false

pre_install_actions:
  - type: monitoring_grafana_db_secret_bootstrap

secrets:
  - helm_key: "grafana.adminExistingSecret"
    source_secret: grafana-db
    source_namespace: monitoring
    data_key: username
    rotate_with_service: true
    helm_flag: --set

  - helm_key: "grafana.adminPassword"
    source_secret: grafana-db
    source_namespace: monitoring
    data_key: password
    rotate_with_service: true
    helm_flag: --set

---
service:
  name: horizon
  version: ~

chart: {}

secrets:
  - helm_key: "endpoints.identity.auth.admin.password"
    source_secret: keystone-admin
    source_namespace: openstack
    data_key: password
    helm_flag: --set

  - helm_key: "endpoints.oslo_cache.auth.memcache_secret_key"
    source_secret: os-memcached
    source_namespace: openstack
    data_key: memcache_secret_key
    helm_flag: --set

  - helm_key: "conf.horizon.local_settings.config.horizon_secret_key"
    source_secret: horizon-secret-key
    source_namespace: openstack
    data_key: horizon_secret_key
    helm_flag: --set

  - helm_key: "endpoints.oslo_db.auth.admin.password"
    source_secret: mariadb
    source_namespace: openstack
    data_key: root-password
    helm_flag: --set

  - helm_key: "endpoints.oslo_db.auth.horizon.password"
    source_secret: horizon-db-password
    source_namespace: openstack
    data_key: password
    helm_flag: --set

---
service:
  name: longhorn
  namespace: longhorn-system
  version: ~

chart:
  service_name: longhorn
  repo_name: longhorn
  repo_url: https://charts.longhorn.io
  global_overrides: false

secrets: []

post_install_actions:
  - type: namespace_resource_dump_if_pods_present
    namespace: longhorn-system
    resources:
      - pods
      - svc
